name: deep-research tests

on:
  push:
    branches: [main]
    paths:
      - 'deep-research/**'
      - '.github/workflows/test.yml'
  pull_request:
    paths:
      - 'deep-research/**'
      - '.github/workflows/test.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: deep-research

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: deep-research/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: |
          python -c "import ast; ast.parse(open('deep_research.py').read())"
          python -c "import ast; ast.parse(open('test_deep_research.py').read())"
          python -c "import ast; ast.parse(open('test_research_loop.py').read())"
          python -c "import ast; ast.parse(open('web.py').read())"

      - name: Run unit tests
        run: python -m unittest discover -v

      - name: CLI --help works without keys
        env:
          DEEPSEEK_API_KEY: ""
        run: python deep_research.py --help
