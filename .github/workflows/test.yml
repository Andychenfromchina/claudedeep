name: claudedeep tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: |
          for f in deep_research.py prompts.py _log.py stats.py web.py mcp_server.py run_evals.py run_ab.py; do
            python -c "import ast; ast.parse(open('$f').read())"
          done

      - name: Run unit tests
        run: python -m unittest discover -v

      - name: CLI --help works without keys
        env:
          DEEPSEEK_API_KEY: ""
        run: python deep_research.py --help
