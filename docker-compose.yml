services:
  claudedeep:
    build: .
    image: claudedeep:local
    container_name: claudedeep
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:?DEEPSEEK_API_KEY is required}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      SERPER_API_KEY: ${SERPER_API_KEY:-}
      BING_API_KEY: ${BING_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GOOGLE_CSE_ID: ${GOOGLE_CSE_ID:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      SEARCH_PROVIDER: ${SEARCH_PROVIDER:-auto}
      DEEP_RESEARCH_LOG: ${DEEP_RESEARCH_LOG:-json}
    volumes:
      - cache:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz', timeout=2).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  cache:
